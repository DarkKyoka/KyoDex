name: kyodex
description: "FOSS App"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Database
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4+4

  # Networking
  http: ^1.4.0

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # Image caching
  cached_network_image: ^3.4.1

  # Local storage (for theme preference)
  shared_preferences: ^2.5.3

  # Path for local file system
  path_provider: ^2.1.5
  path: ^1.9.1
  url_launcher: ^6.3.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/Icon.png"
  #min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/Icon.png"
